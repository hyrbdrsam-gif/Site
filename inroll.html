<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ثبت نام دوره</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav id="navbar">
    <div class="menu-toggle" id="menu-toggle" aria-label="باز کردن منو" aria-expanded="false" role="button" tabindex="0">
      ☰
    </div>

    <div class="nav-links" id="nav-links">
      <a href="index.html">خانه</a>
      <a href="courses.html" class="active">دوره‌ها</a>
      <a href="dashboard.html">داشبورد من</a>
      <a href="about.html">درباره ما</a>
      <a href="contact.html">تماس با ما</a>
    </div>
  </nav>

  <main class="container" style="padding-top:120px; max-width:700px">

    <section class="page-section reveal">
      <h1>ثبت مشخصات دانشجو</h1>

      <p id="courseInfo" style="margin-bottom:25px; font-weight:bold; color:var(--accent-color, #ff6b6b);"></p>

      <form id="enrollForm" novalidate>
        <div class="form-group">
          <label for="fullName">نام و نام خانوادگی</label>
          <input type="text" id="fullName" name="fullName" placeholder="نمونه: علی محمدی">
          <span class="error-text" id="nameError"></span>
        </div>

        <div class="form-group">
          <label for="phone">شماره موبایل</label>
          <input type="tel" id="phone" name="phone" inputmode="numeric" placeholder="نمونه: 09123456789">
          <span class="error-text" id="phoneError"></span>
        </div>

        <div class="form-group">
          <label for="email">ایمیل</label>
          <input type="email" id="email" name="email" placeholder="نمونه: info@site.com">
          <span class="error-text" id="emailError"></span>
        </div>

        <button class="main-btn" type="submit">
          ادامه و پرداخت
        </button>
      </form>
    </section>

  </main>

  <footer>
    <p>© 2026 تمامی حقوق این سایت محفوظ است.</p>
  </footer>

  <script>
    const menuToggle = document.getElementById("menu-toggle");
    const navLinks = document.getElementById("nav-links");

    function toggleMenu() {
      navLinks.classList.toggle("active");
      const expanded = menuToggle.getAttribute("aria-expanded") === "true";
      menuToggle.setAttribute("aria-expanded", String(!expanded));
    }

    menuToggle.addEventListener("click", toggleMenu);

    const navbar = document.getElementById("navbar");
    window.addEventListener("scroll", function () {
      if (window.scrollY > 20) {
        navbar.classList.add("scrolled");
      } else {
        navbar.classList.remove("scrolled");
      }
    });

    const revealElements = document.querySelectorAll(".reveal");
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("active");
        }
      });
    }, { threshold: 0.15 });
    revealElements.forEach((el) => observer.observe(el));

    const course = JSON.parse(localStorage.getItem("checkoutData") || "null");

    if (!course || !course.name || !course.price) {
      document.body.innerHTML = "<h2 style='text-align:center;margin-top:120px'>اطلاعات دوره یافت نشد</h2>";
    } else {
      document.getElementById("courseInfo").textContent =
        "دوره انتخابی: " + course.name +
        " | مبلغ: " +
        Number(course.price).toLocaleString("fa-IR") +
        " تومان";
    }

    function clearErrors() {
      document.querySelectorAll(".error-text").forEach((e) => e.textContent = "");
      document.querySelectorAll("input").forEach((input) => input.classList.remove("input-error"));
    }

    document.getElementById("enrollForm").addEventListener("submit", function (e) {
      e.preventDefault();
      clearErrors();

      const name = document.getElementById("fullName").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim();

      let valid = true;

      if (name.length < 3) {
        document.getElementById("nameError").textContent = "نام معتبر وارد کنید (حداقل ۳ حرف)";
        document.getElementById("fullName").classList.add("input-error");
        valid = false;
      }

      if (!/^09\d{9}$/.test(phone)) {
        document.getElementById("phoneError").textContent = "شماره موبایل معتبر نیست (مانند 09123456789)";
        document.getElementById("phone").classList.add("input-error");
        valid = false;
      }

      if (!/^\S+@\S+\.\S+$/.test(email)) {
        document.getElementById("emailError").textContent = "ایمیل معتبر نیست (مانند info@site.com)";
        document.getElementById("email").classList.add("input-error");
        valid = false;
      }

      if (!valid) return;

      const data = {
        name: course.name,
        price: Number(course.price),
        fullName: name,
        phone: phone,
        email: email
      };

      localStorage.setItem("checkoutData", JSON.stringify(data));
      window.location.href = "payment.html";
    });
  </script>

</body>
</html>
